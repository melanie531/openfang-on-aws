<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: white; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="850"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Colors
const COLORS = {
  bg: '#FFFFFF',
  vpc: '#E8F4FD',
  publicSub: '#FFF3E0',
  privateSub: '#E8F5E9',
  border: '#37474F',
  aws: '#232F3E',
  awsOrange: '#FF9900',
  ec2: '#ED7100',
  nat: '#8C4FFF',
  ssm: '#DD344C',
  bedrock: '#01A88D',
  iam: '#DD344C',
  litellm: '#4FC3F7',
  openfang: '#7C4DFF',
  text: '#263238',
  lightText: '#546E7A',
  arrow: '#607D8B',
  sg: '#EF5350',
  endpoint: '#0277BD'
};

// Background
ctx.fillStyle = COLORS.bg;
ctx.fillRect(0, 0, 1200, 850);

// Title
ctx.fillStyle = COLORS.aws;
ctx.font = 'bold 24px Arial';
ctx.fillText('OpenFang on AWS — Secure Deployment Architecture', 30, 40);
ctx.fillStyle = COLORS.lightText;
ctx.font = '14px Arial';
ctx.fillText('Amazon Bedrock via PrivateLink + LiteLLM Proxy + SSM Session Manager', 30, 62);

// AWS Cloud box
ctx.strokeStyle = COLORS.awsOrange;
ctx.lineWidth = 3;
ctx.setLineDash([]);
roundRect(ctx, 20, 80, 1160, 750, 12);
ctx.stroke();
ctx.fillStyle = COLORS.awsOrange;
ctx.font = 'bold 14px Arial';
ctx.fillText('☁ AWS Cloud', 40, 100);

// VPC box
ctx.strokeStyle = '#1565C0';
ctx.lineWidth = 2;
roundRect(ctx, 50, 115, 700, 690, 10);
ctx.stroke();
ctx.fillStyle = '#1565C0';
ctx.font = 'bold 13px Arial';
ctx.fillText('VPC (10.0.0.0/16)', 70, 135);

// Public Subnet
ctx.fillStyle = COLORS.publicSub;
roundRect(ctx, 70, 150, 310, 200, 8);
ctx.fill();
ctx.strokeStyle = '#E65100';
ctx.lineWidth = 1.5;
roundRect(ctx, 70, 150, 310, 200, 8);
ctx.stroke();
ctx.fillStyle = '#E65100';
ctx.font = 'bold 12px Arial';
ctx.fillText('Public Subnet', 90, 172);

// NAT Gateway in public subnet
drawBox(ctx, 120, 190, 200, 60, '#8C4FFF', 'NAT Gateway', 'Outbound internet access');

// Internet Gateway
drawBox(ctx, 120, 278, 200, 50, '#E65100', 'Internet Gateway', 'igw-xxx');

// Private Subnet
ctx.fillStyle = COLORS.privateSub;
roundRect(ctx, 70, 370, 660, 320, 8);
ctx.fill();
ctx.strokeStyle = '#2E7D32';
ctx.lineWidth = 1.5;
roundRect(ctx, 70, 370, 660, 320, 8);
ctx.stroke();
ctx.fillStyle = '#2E7D32';
ctx.font = 'bold 12px Arial';
ctx.fillText('Private Subnet — No Public IP', 90, 392);

// EC2 Instance
ctx.fillStyle = '#FFF8E1';
roundRect(ctx, 100, 410, 600, 260, 8);
ctx.fill();
ctx.strokeStyle = COLORS.ec2;
ctx.lineWidth = 2;
roundRect(ctx, 100, 410, 600, 260, 8);
ctx.stroke();
ctx.fillStyle = COLORS.ec2;
ctx.font = 'bold 13px Arial';
ctx.fillText('EC2 t3.xlarge (16GB RAM + 4GB Swap)', 120, 433);
ctx.fillStyle = COLORS.lightText;
ctx.font = '11px Arial';
ctx.fillText('Amazon Linux 2023 | IMDSv2 | gp3 Encrypted EBS', 120, 448);

// OpenFang container
drawBox(ctx, 130, 465, 250, 80, '#7C4DFF', 'OpenFang', 'Agent OS + Researcher Hand\nPort 4200 | localhost only');

// LiteLLM container
drawBox(ctx, 420, 465, 250, 80, '#0288D1', 'LiteLLM Proxy', 'OpenAI → Bedrock Bridge\nPort 4000 | SigV4 signing');

// Security Group label
ctx.setLineDash([6, 4]);
ctx.strokeStyle = COLORS.sg;
ctx.lineWidth = 1.5;
roundRect(ctx, 95, 405, 610, 270, 6);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = COLORS.sg;
ctx.font = '11px Arial';
ctx.fillText('🔒 Security Group: 0 inbound | Outbound: 443, 80, 53 only', 120, 668);

// IAM Role
drawBox(ctx, 130, 580, 250, 50, '#DD344C', 'IAM Instance Profile', 'Bedrock Invoke + SSM Core');

// Persistent Volume
drawBox(ctx, 420, 580, 250, 50, '#6D4C41', 'Persistent Volume', 'SQLite + Agent Workspaces');

// ─── VPC Endpoint box (inside VPC, below private subnet) ─────
ctx.fillStyle = '#E1F5FE';
roundRect(ctx, 70, 710, 660, 80, 8);
ctx.fill();
ctx.strokeStyle = COLORS.endpoint;
ctx.lineWidth = 2;
roundRect(ctx, 70, 710, 660, 80, 8);
ctx.stroke();
ctx.fillStyle = COLORS.endpoint;
ctx.font = 'bold 13px Arial';
ctx.fillText('VPC Interface Endpoint (PrivateLink)', 90, 735);
ctx.fillStyle = COLORS.lightText;
ctx.font = '11px Arial';
ctx.fillText('com.amazonaws.{region}.bedrock-runtime | Private DNS enabled', 90, 755);
ctx.fillText('Bedrock traffic stays within AWS network — never traverses NAT or public internet', 90, 772);

// --- Right side: AWS Services ---

// Amazon Bedrock
drawBox(ctx, 820, 140, 320, 120, '#01A88D', 'Amazon Bedrock Runtime', 'Claude Sonnet 4.6 / Haiku 4.5\nCross-Region Inference Profiles\nIAM Auth (Instance Profile)');

// SSM
drawBox(ctx, 820, 300, 320, 80, '#DD344C', 'SSM Session Manager', 'Secure Shell Access\nNo SSH Keys | No Open Ports');

// CloudWatch
drawBox(ctx, 820, 420, 320, 70, '#FF6F00', 'CloudWatch', 'Alarms + VPC Flow Logs');

// User/Operator
drawBox(ctx, 820, 550, 320, 80, '#37474F', '👤 Operator', 'aws ssm start-session\nPort Forward → localhost:4200');

// --- Arrows ---
ctx.setLineDash([]);
ctx.lineWidth = 2;

// OpenFang → LiteLLM
drawArrow(ctx, 380, 505, 420, 505, '#607D8B');
ctx.fillStyle = COLORS.lightText;
ctx.font = '10px Arial';
ctx.fillText('OpenAI API', 385, 496);

// LiteLLM → VPC Endpoint (Bedrock path - GREEN)
drawArrow(ctx, 545, 545, 545, 710, '#01A88D');
ctx.fillStyle = '#01A88D';
ctx.font = 'bold 10px Arial';
ctx.fillText('Bedrock calls', 555, 630);
ctx.font = '10px Arial';
ctx.fillText('(PrivateLink)', 555, 643);

// VPC Endpoint → Bedrock
drawArrow(ctx, 730, 740, 820, 200, '#01A88D');
ctx.fillStyle = '#01A88D';
ctx.font = 'bold 10px Arial';
ctx.fillText('SigV4 signed', 770, 440);
ctx.font = '10px Arial';
ctx.fillText('(private network)', 770, 453);

// OpenFang → NAT (internet path - PURPLE)
drawArrow(ctx, 255, 465, 255, 370, '#8C4FFF');
drawArrow(ctx, 255, 370, 220, 250, '#8C4FFF');
ctx.fillStyle = '#8C4FFF';
ctx.font = '10px Arial';
ctx.fillText('web_search', 195, 360);
ctx.fillText('web_fetch', 195, 372);

// NAT → IGW
drawArrow(ctx, 220, 250, 220, 278, '#8C4FFF');

// IGW → Internet label
ctx.fillStyle = '#E65100';
ctx.font = 'bold 10px Arial';
ctx.fillText('→ Internet', 330, 305);

// SSM → EC2
drawArrow(ctx, 820, 345, 700, 450, '#DD344C');
ctx.fillStyle = '#DD344C';
ctx.font = '10px Arial';
ctx.fillText('SSM Tunnel', 740, 385);

// Operator → SSM
drawArrow(ctx, 980, 550, 980, 380, '#37474F');

// IAM → Bedrock (dotted)
ctx.setLineDash([4, 4]);
drawArrow(ctx, 380, 605, 820, 230, '#DD344C');
ctx.setLineDash([]);
ctx.fillStyle = '#DD344C';
ctx.font = '10px Arial';
ctx.fillText('IAM Auth', 600, 395);

// Cost estimate
ctx.fillStyle = COLORS.aws;
ctx.font = 'bold 12px Arial';
ctx.fillText('Monthly Cost: ~$102 (excl. Bedrock tokens)', 820, 670);
ctx.fillStyle = COLORS.lightText;
ctx.font = '11px Arial';
ctx.fillText('EC2 t3.xlarge: ~$60 | NAT GW: ~$32', 820, 688);
ctx.fillText('VPC Endpoint: ~$7.30 | EBS: ~$2.40', 820, 704);

// Legend
ctx.fillStyle = COLORS.text;
ctx.font = 'bold 11px Arial';
ctx.fillText('Security:', 820, 735);
ctx.fillStyle = COLORS.lightText;
ctx.font = '11px Arial';
ctx.fillText('✓ No public IP  ✓ No SSH  ✓ No static credentials', 880, 735);
ctx.fillText('✓ Bedrock via PrivateLink  ✓ 0 inbound SG rules', 820, 752);
ctx.fillText('✓ IMDSv2 only  ✓ Encrypted EBS  ✓ VPC Flow Logs', 820, 769);

// Traffic legend
ctx.fillStyle = '#01A88D';
ctx.font = 'bold 11px Arial';
ctx.fillText('━━ Bedrock (PrivateLink)', 820, 795);
ctx.fillStyle = '#8C4FFF';
ctx.fillText('━━ Internet (NAT Gateway)', 820, 812);

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBox(ctx, x, y, w, h, color, title, subtitle) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  roundRect(ctx, x+2, y+2, w, h, 6);
  ctx.fill();
  // Box
  ctx.fillStyle = color + '15';
  roundRect(ctx, x, y, w, h, 6);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  roundRect(ctx, x, y, w, h, 6);
  ctx.stroke();
  // Title
  ctx.fillStyle = color;
  ctx.font = 'bold 13px Arial';
  ctx.fillText(title, x + 12, y + 22);
  // Subtitle (multiline)
  if (subtitle) {
    ctx.fillStyle = COLORS.lightText;
    ctx.font = '11px Arial';
    const lines = subtitle.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, x + 12, y + 40 + i * 15);
    });
  }
}

function drawArrow(ctx, x1, y1, x2, y2, color) {
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // Arrowhead
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10 * Math.cos(angle - 0.4), y2 - 10 * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - 10 * Math.cos(angle + 0.4), y2 - 10 * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}
</script>
</body>
</html>
